<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino em Andamento</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>
    
    <a href="../index.html" class="btn-voltar">
        <i class="fa-solid fa-arrow-left"></i> Voltar ao Início
    </a>
    
    <section class="treino-page">
        
        <h1 id="nomeTreino">Treino</h1>
        
        <div class="timer-box">
            <div class="timer-icon">
                <i class="fa-solid fa-stopwatch"></i>
            </div>
            <span id="timer">00:00:00</span>
        </div>
        
        <div id="listaExercicios">
        </div>
        
        <button id="finishWorkoutBtn">
            <i class="fa-solid fa-circle-check"></i> Encerrar Treino
        </button>
        
    </section>
    
    <script src="treino.js"></script>

</html>
